handler_code_proposal: "def weather_query(rule, question, context):\n    \"\"\"Handler\
  \ for weather queries using Open-Meteo tool.\n    Draft for human review.\n    \"\
  \"\"\n    location = context.get(\"location\")\n    target_date = context.get(\"\
  target_date\", \"tomorrow\")\n\n    if not location:\n        return {\n       \
  \     \"rule_id\": rule.id,\n            \"rule_name\": rule.name,\n           \
  \ \"type\": \"api_tool\",\n            \"requires_more_info\": True,\n         \
  \   \"missing_fields\": [\"location\"],\n            \"reply\": \"请问您想查询哪个城市的天气？\"\
  \n        }\n\n    # TODO: Replace with actual tool invocation in production pipeline\n\
  \    # tool_response = call_tool(\"open_meteo_weather\", location=location, date=target_date)\n\
  \    # For draft purposes, assume structured parsing of tool output:\n    tool_data\
  \ = {\n        \"location\": location,\n        \"date\": target_date,\n       \
  \ \"weather\": \"中雨\",\n        \"temp_max\": 22.0,\n        \"temp_min\": 14.8,\n\
  \        \"precipitation\": 17.5,\n        \"wind_speed_max\": 20.4\n    }\n\n \
  \   reply = (\n        f\"{location}明天天气为{tool_data['weather']}，\"\n        f\"\
  气温 {tool_data['temp_min']}°C 至 {tool_data['temp_max']}°C，\"\n        f\"降水量约 {tool_data['precipitation']}\
  \ mm，\"\n        f\"最大风速 {tool_data['wind_speed_max']} km/h。\"\n        f\"建议携带雨具，注意防风。\"\
  \n    )\n\n    return {\n        \"rule_id\": rule.id,\n        \"rule_name\": rule.name,\n\
  \        \"type\": \"api_tool\",\n        \"requires_more_info\": False,\n     \
  \   \"reply\": reply,\n        \"tool_used\": \"open_meteo_weather\",\n        \"\
  raw_data\": tool_data\n    }"
